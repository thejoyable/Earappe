<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Earring Try-On</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        #videoElement {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        #startButton { background: #667eea; color: white; }
        #startButton:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        #stopButton { background: #f56565; color: white; }
        #stopButton:hover:not(:disabled) {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .loading { display: none; text-align: center; margin-top: 20px; }
        .loading.active { display: block; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>✨ AR Earring Try-On</h1>
    <div class="container">
        <div class="video-container">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button id="startButton">Start Camera</button>
            <button id="stopButton" disabled>Stop</button>
        </div>
        <div class="status" id="status">Click "Start Camera" to begin</div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading MediaPipe...</p>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        // ═══════════════════════════════════════════════════════════════
        // CONFIG
        // ═══════════════════════════════════════════════════════════════
        const NOSE = 1, LEFT_TRAG = 234, RIGHT_TRAG = 454;
        const LEFT_EYE_OUTER = 33, RIGHT_EYE_OUTER = 263;
        const LEFT_BASE = 93, LEFT_REF = 123;
        const RIGHT_BASE = 323, RIGHT_REF = 352;
        const FOREHEAD = 10, CHIN = 152;

        const VIS_RATIO_THRESH = 0.75;
        const EARLOBE_OFFSET = 0.47;
        const EARRING_SIZE_RATIO = 0.25;
        const TILT_DAMPING = 0.35;
        const FADE_SPEED = 0.15;
        const ANCHOR_Y_SHIFT = 0.0;

        // ═══════════════════════════════════════════════════════════════
        // ONE EURO FILTER  –  adaptive low-pass used by Snap / IG
        //
        // • Low speed → heavy smoothing (kills jitter)
        // • High speed → light smoothing (kills lag)
        // Reference: Casiez et al., "1€ Filter", CHI 2012
        // ═══════════════════════════════════════════════════════════════
        class OneEuroFilter {
            constructor(t0, x0, min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this.min_cutoff = min_cutoff;  // Hz – lower = smoother when still
                this.beta = beta;               // speed coefficient – higher = less lag when fast
                this.d_cutoff = d_cutoff;       // Hz – derivative smoothing
                this.x_prev = parseFloat(x0);
                this.dx_prev = 0.0;
                this.t_prev = t0;
            }

            // ── smoothing factor from cutoff frequency ──
            static _alpha(te, cutoff) {
                const r = 2.0 * Math.PI * cutoff * te;
                return r / (r + 1.0);
            }

            filter(t, x) {
                let te = t - this.t_prev;
                if (te < 1e-9) te = 1e-6;

                // smoothed derivative
                const ad = OneEuroFilter._alpha(te, this.d_cutoff);
                const dx = (x - this.x_prev) / te;
                const dx_hat = ad * dx + (1.0 - ad) * this.dx_prev;

                // adaptive cutoff: faster movement → higher cutoff → less smoothing
                const cutoff = this.min_cutoff + this.beta * Math.abs(dx_hat);
                const a = OneEuroFilter._alpha(te, cutoff);
                const x_hat = a * x + (1.0 - a) * this.x_prev;

                this.x_prev = x_hat;
                this.dx_prev = dx_hat;
                this.t_prev = t;
                return x_hat;
            }
        }

        // ── convenience wrappers ──
        class PointStabilizer {
            /** Dual One-Euro filters for a 2-D point. */
            constructor(min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this._fx = null;
                this._fy = null;
                this._kw = { min_cutoff, beta, d_cutoff };
            }

            update(t, x, y) {
                if (this._fx === null) {
                    this._fx = new OneEuroFilter(t, x, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    this._fy = new OneEuroFilter(t, y, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    return [x, y];
                }
                return [this._fx.filter(t, x), this._fy.filter(t, y)];
            }
        }

        class ScalarStabilizer {
            /** Single One-Euro filter for a scalar. */
            constructor(min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this._f = null;
                this._kw = { min_cutoff, beta, d_cutoff };
            }

            update(t, v) {
                if (this._f === null) {
                    this._f = new OneEuroFilter(t, v, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    return v;
                }
                return this._f.filter(t, v);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // AR EARRING TRACKER
        // ═══════════════════════════════════════════════════════════════
        class AREarTracker {
            constructor() {
                // ── load earring images ──
                this.earring_L = new Image();
                this.earring_R = new Image();
                this.earring_L.src = '/static/earring.png';
                
                // mirror for right side
                this.earring_L.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = this.earring_L.width;
                    canvas.height = this.earring_L.height;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(-1, 1);
                    ctx.drawImage(this.earring_L, -canvas.width, 0);
                    this.earring_R.src = canvas.toDataURL();
                };

                // ── per-ear stabilizers ──
                // position – responsive, low lag
                this.pos_L = new PointStabilizer(1.5, 0.5);
                this.pos_R = new PointStabilizer(1.5, 0.5);
                // size – heavier smoothing (size shouldn't jitter)
                this.sz_L = new ScalarStabilizer(0.5, 0.05);
                this.sz_R = new ScalarStabilizer(0.5, 0.05);

                // ── global stabilizers ──
                this.angle_stab = new ScalarStabilizer(1.2, 0.3);
                this.faceh_stab = new ScalarStabilizer(0.6, 0.05);

                // ── fade state ──
                this.opacity_L = 0.0;
                this.opacity_R = 0.0;
                this.cache_L = null;      // (x, y, sz)
                this.cache_R = null;
                this.cache_angle = 0.0;
                this.t0 = performance.now() / 1000;
            }

            // ─────────────────── helpers ───────────────────
            _t() {
                return performance.now() / 1000 - this.t0;
            }

            _visibility(lm, w, h) {
                /** Which ears are geometrically visible (not occluded by head turn). */
                const nose = lm[NOSE];
                const L = lm[LEFT_TRAG];
                const R = lm[RIGHT_TRAG];
                const ld = this._distance(L, nose, w, h);
                const rd = this._distance(R, nose, w, h);
                return [
                    ld / (rd + 1e-6) > VIS_RATIO_THRESH,
                    rd / (ld + 1e-6) > VIS_RATIO_THRESH
                ];
            }

            _distance(p1, p2, w, h) {
                const dx = (p1.x - p2.x) * w;
                const dy = (p1.y - p2.y) * h;
                return Math.sqrt(dx * dx + dy * dy);
            }

            _head_roll_deg(lm, w, h) {
                /** Roll angle from outer eye corners (degrees). */
                const le = lm[LEFT_EYE_OUTER];
                const re = lm[RIGHT_EYE_OUTER];
                const dy = (re.y - le.y) * h;
                const dx = (re.x - le.x) * w;
                return Math.atan2(dy, dx) * 180 / Math.PI;
            }

            _face_height(lm, w, h) {
                /** Euclidean distance forehead → chin (pixels). */
                return this._distance(lm[FOREHEAD], lm[CHIN], w, h);
            }

            _yaw_factors(lm, w, h) {
                /**
                 * Per-ear scale multiplier driven by face yaw.
                 * Frontal → 1.0 ; turned away → shrinks to 0.4
                 * Gives a natural perspective / foreshortening effect.
                 */
                const nose = lm[NOSE];
                const L = lm[LEFT_TRAG];
                const R = lm[RIGHT_TRAG];
                const ld = this._distance(L, nose, w, h);
                const rd = this._distance(R, nose, w, h);
                const s = ld + rd + 1e-6;
                return [
                    Math.max(0.4, Math.min(1.0, ld / s * 2.0)),
                    Math.max(0.4, Math.min(1.0, rd / s * 2.0))
                ];
            }

            _estimate_lobe(lm, base_id, ref_id, w, h) {
                /**
                 * Project from a jaw-contour landmark outward along the
                 * jaw → ear direction to estimate the earlobe position.
                 */
                const bx = lm[base_id].x;
                const by = lm[base_id].y;
                const dx = bx - lm[ref_id].x;
                const dy = by - lm[ref_id].y;
                const px = bx + dx * EARLOBE_OFFSET;
                const py = by + dy * EARLOBE_OFFSET;
                return [px * w, py * h];
            }

            // ─────────────────── overlay ───────────────────
            _overlay(ctx, earring_src, cx, cy, size, angle_deg, opacity) {
                /**
                 * Composite an earring onto the canvas with:
                 * • correct sizing
                 * • rotation about the attachment point (top-centre + ANCHOR_Y_SHIFT)
                 * • alpha blending scaled by current opacity
                 */
                if (size < 4 || opacity < 0.01 || !earring_src.complete) return;

                const aspect = earring_src.width / earring_src.height;
                const nh = Math.max(Math.floor(size), 2);
                const nw = Math.max(Math.floor(nh * aspect), 2);

                // attachment point = top-centre shifted down by ANCHOR_Y_SHIFT
                const angle_applied = angle_deg * TILT_DAMPING;  // gravity damping

                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.translate(cx, cy);
                ctx.rotate((-angle_applied) * Math.PI / 180);
                ctx.translate(-nw / 2, ANCHOR_Y_SHIFT * nh);
                ctx.drawImage(earring_src, 0, 0, nw, nh);
                ctx.restore();
            }

            // ─────────────────── per-frame entry point ───────────────────
            process(ctx, results, w, h) {
                const t = this._t();

                // ── no face: fade both earrings out gracefully ──
                if (!results.faceLandmarks || results.faceLandmarks.length === 0) {
                    this.opacity_L = Math.max(0.0, this.opacity_L - FADE_SPEED);
                    this.opacity_R = Math.max(0.0, this.opacity_R - FADE_SPEED);
                    
                    if (this.cache_L && this.opacity_L > 0.01) {
                        this._overlay(ctx, this.earring_L, ...this.cache_L, this.cache_angle, this.opacity_L);
                    }
                    if (this.cache_R && this.opacity_R > 0.01) {
                        this._overlay(ctx, this.earring_R, ...this.cache_R, this.cache_angle, this.opacity_R);
                    }
                    return;
                }

                const lm = results.faceLandmarks[0];
                const [show_L, show_R] = this._visibility(lm, w, h);

                // ── face-wide metrics (stabilised) ──
                const fh = this.faceh_stab.update(t, this._face_height(lm, w, h));
                const angle = this.angle_stab.update(t, this._head_roll_deg(lm, w, h));
                const [lf, rf] = this._yaw_factors(lm, w, h);
                const base_sz = fh * EARRING_SIZE_RATIO;

                // ── LEFT earring ──
                if (show_L) {
                    let [x, y] = this._estimate_lobe(lm, LEFT_BASE, LEFT_REF, w, h);
                    [x, y] = this.pos_L.update(t, x, y);
                    const sz = this.sz_L.update(t, base_sz * lf);
                    this.opacity_L = Math.min(1.0, this.opacity_L + FADE_SPEED);
                    this.cache_L = [x, y, sz];
                } else {
                    this.opacity_L = Math.max(0.0, this.opacity_L - FADE_SPEED);
                }

                if (this.cache_L && this.opacity_L > 0.01) {
                    this._overlay(ctx, this.earring_L, ...this.cache_L, angle, this.opacity_L);
                }

                // ── RIGHT earring ──
                if (show_R) {
                    let [x, y] = this._estimate_lobe(lm, RIGHT_BASE, RIGHT_REF, w, h);
                    [x, y] = this.pos_R.update(t, x, y);
                    const sz = this.sz_R.update(t, base_sz * rf);
                    this.opacity_R = Math.min(1.0, this.opacity_R + FADE_SPEED);
                    this.cache_R = [x, y, sz];
                } else {
                    this.opacity_R = Math.max(0.0, this.opacity_R - FADE_SPEED);
                }

                if (this.cache_R && this.opacity_R > 0.01) {
                    this._overlay(ctx, this.earring_R, ...this.cache_R, angle, this.opacity_R);
                }

                this.cache_angle = angle;
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════════════
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');

        let faceLandmarker, stream = null, animationId = null;
        let tracker = new AREarTracker();
        let lastVideoTime = -1;

        async function initializeMediaPipe() {
            loading.classList.add('active');
            status.textContent = 'Loading MediaPipe...';
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1,                        // max_num_faces=1
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false,
                    minFaceDetectionConfidence: 0.7,
                    minFacePresenceConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });
                loading.classList.remove('active');
                status.textContent = 'Ready! Click "Start Camera"';
                startButton.disabled = false;
            } catch (error) {
                console.error('Error:', error);
                loading.classList.remove('active');
                status.textContent = 'Error loading MediaPipe';
            }
        }

        async function startCamera() {
            try {
                status.textContent = 'Requesting camera...';
                
                // Try 60fps first at various resolutions, then fallback to 30fps
                const constraints = [
                    { width: 1920, height: 1080, frameRate: 60 },
                    { width: 1280, height: 720, frameRate: 60 },
                    { width: 960, height: 540, frameRate: 60 },
                    { width: 640, height: 480, frameRate: 60 },
                    { width: 640, height: 360, frameRate: 60 },
                    { width: 1920, height: 1080, frameRate: 30 },
                    { width: 1280, height: 720, frameRate: 30 },
                    { width: 960, height: 540, frameRate: 30 },
                    { width: 640, height: 480, frameRate: 30 }
                ];

                let streamAcquired = false;
                for (const constraint of constraints) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                width: { ideal: constraint.width },
                                height: { ideal: constraint.height },
                                frameRate: { ideal: constraint.frameRate },
                                facingMode: 'user'
                            }
                        });
                        
                        const track = stream.getVideoTracks()[0];
                        const settings = track.getSettings();
                        console.log(`Camera started: ${settings.width}x${settings.height}@${settings.frameRate}fps`);
                        status.textContent = `Camera: ${settings.width}x${settings.height}@${settings.frameRate}fps`;
                        streamAcquired = true;
                        break;
                    } catch (err) {
                        console.log(`Failed ${constraint.width}x${constraint.height}@${constraint.frameRate}fps, trying next...`);
                    }
                }

                if (!streamAcquired) {
                    throw new Error('No compatible camera configuration found');
                }

                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startButton.disabled = true;
                    stopButton.disabled = false;
                    processFrame();
                });
            } catch (err) {
                console.error('Camera error:', err);
                status.textContent = 'Camera access denied or not available';
            }
        }

        function stopCamera() {
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            startButton.disabled = false;
            stopButton.disabled = true;
            status.textContent = 'Camera stopped';
            lastVideoTime = -1;
        }

        function processFrame() {
            if (!faceLandmarker || !video.videoWidth) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            const currentTime = video.currentTime;
            if (currentTime !== lastVideoTime) {
                lastVideoTime = currentTime;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const results = faceLandmarker.detectForVideo(video, performance.now());
                tracker.process(ctx, results, canvas.width, canvas.height);
            }
            
            animationId = requestAnimationFrame(processFrame);
        }

        startButton.addEventListener('click', startCamera);
        stopButton.addEventListener('click', stopCamera);
        startButton.disabled = true;
        initializeMediaPipe();
    </script>
</body>
</html>
