<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Earring Try-On</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        #videoElement {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        #startButton {
            background: #667eea;
            color: white;
        }

        #startButton:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #stopButton {
            background: #f56565;
            color: white;
        }

        #stopButton:hover:not(:disabled) {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>✨ AR Earring Try-On</h1>
    <div class="container">
        <div class="video-container">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="three-canvas"></canvas>
        </div>
        <div class="controls">
            <button id="startButton">Start Camera</button>
            <button id="stopButton" disabled>Stop</button>
        </div>
        <div class="status" id="status">Click "Start Camera" to begin</div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading MediaPipe...</p>
        </div>
    </div>

    <!-- Import Map for Three.js modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ═══════════════════════════════════════════════════════════════
        // CONFIG
        // ═══════════════════════════════════════════════════════════════
        const NOSE = 1, LEFT_TRAG = 234, RIGHT_TRAG = 454;
        const LEFT_EYE_OUTER = 33, RIGHT_EYE_OUTER = 263;
        const LEFT_BASE = 93, LEFT_REF = 123;
        const RIGHT_BASE = 323, RIGHT_REF = 352;
        const FOREHEAD = 10, CHIN = 152;

        const VIS_RATIO_THRESH = 0.75;
        const EARLOBE_OFFSET = 0.47;
        const EARRING_SIZE_RATIO = 0.25;
        const TILT_DAMPING = 0.35;
        const FADE_SPEED = 0.15;
        const ANCHOR_Y_SHIFT = 0.0;

        // Scale factor: how large the 3D model should be relative to
        // the earring "size" in pixels. The model is normalized to 1 unit max,
        // and the camera maps 1 unit = 1 pixel, so 1.0 means the model will
        // be exactly `sz` pixels tall. Adjust if model appears too big/small.
        const MODEL_SCALE_FACTOR = 0.5;

        // ═══════════════════════════════════════════════════════════════
        // ONE EURO FILTER  –  adaptive low-pass used by Snap / IG
        //
        // • Low speed → heavy smoothing (kills jitter)
        // • High speed → light smoothing (kills lag)
        // Reference: Casiez et al., "1€ Filter", CHI 2012
        // ═══════════════════════════════════════════════════════════════
        class OneEuroFilter {
            constructor(t0, x0, min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this.min_cutoff = min_cutoff;  // Hz – lower = smoother when still
                this.beta = beta;               // speed coefficient – higher = less lag when fast
                this.d_cutoff = d_cutoff;       // Hz – derivative smoothing
                this.x_prev = parseFloat(x0);
                this.dx_prev = 0.0;
                this.t_prev = t0;
            }

            // ── smoothing factor from cutoff frequency ──
            static _alpha(te, cutoff) {
                const r = 2.0 * Math.PI * cutoff * te;
                return r / (r + 1.0);
            }

            filter(t, x) {
                let te = t - this.t_prev;
                if (te < 1e-9) te = 1e-6;

                // smoothed derivative
                const ad = OneEuroFilter._alpha(te, this.d_cutoff);
                const dx = (x - this.x_prev) / te;
                const dx_hat = ad * dx + (1.0 - ad) * this.dx_prev;

                // adaptive cutoff: faster movement → higher cutoff → less smoothing
                const cutoff = this.min_cutoff + this.beta * Math.abs(dx_hat);
                const a = OneEuroFilter._alpha(te, cutoff);
                const x_hat = a * x + (1.0 - a) * this.x_prev;

                this.x_prev = x_hat;
                this.dx_prev = dx_hat;
                this.t_prev = t;
                return x_hat;
            }
        }

        // ── convenience wrappers ──
        class PointStabilizer {
            /** Dual One-Euro filters for a 2-D point. */
            constructor(min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this._fx = null;
                this._fy = null;
                this._kw = { min_cutoff, beta, d_cutoff };
            }

            update(t, x, y) {
                if (this._fx === null) {
                    this._fx = new OneEuroFilter(t, x, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    this._fy = new OneEuroFilter(t, y, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    return [x, y];
                }
                return [this._fx.filter(t, x), this._fy.filter(t, y)];
            }
        }

        class ScalarStabilizer {
            /** Single One-Euro filter for a scalar. */
            constructor(min_cutoff = 1.0, beta = 0.007, d_cutoff = 1.0) {
                this._f = null;
                this._kw = { min_cutoff, beta, d_cutoff };
            }

            update(t, v) {
                if (this._f === null) {
                    this._f = new OneEuroFilter(t, v, this._kw.min_cutoff, this._kw.beta, this._kw.d_cutoff);
                    return v;
                }
                return this._f.filter(t, v);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // THREE.JS SCENE SETUP
        // ═══════════════════════════════════════════════════════════════
        const threeCanvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({
            canvas: threeCanvas,
            alpha: true,
            antialias: true
        });
        renderer.setClearColor(0x000000, 0);  // fully transparent background
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();

        // OrthographicCamera: 1 unit = 1 pixel (set up when video dimensions known)
        let camera = null;

        // ── Lighting ──
        // Positions are in pixel-space (orthographic camera maps 1 unit = 1 pixel)
        // so lights need to be far enough to illuminate the whole scene.
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
        dirLight.position.set(0, 200, 500);
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xccccff, 0.6);
        fillLight.position.set(-300, -100, 400);
        scene.add(fillLight);

        // ── Model containers ──
        // We use Group wrappers so we can set position/rotation/scale/visibility
        // independently of the loaded model's internal transforms.
        const earringGroupL = new THREE.Group();
        const earringGroupR = new THREE.Group();
        earringGroupL.visible = false;
        earringGroupR.visible = false;
        scene.add(earringGroupL);
        scene.add(earringGroupR);

        let modelLoaded = false;

        // Load stud.glb
        const loader = new GLTFLoader();
        loader.load('/static/stud.glb', (gltf) => {
            const model = gltf.scene;

            // Normalize the model: center it and scale so its bounding box
            // has a max dimension of 1.0, making MODEL_SCALE_FACTOR predictable.
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            console.log('Model bounding box:', size);
            console.log('Model center:', center);
            console.log('Max dimension:', maxDim);

            model.position.sub(center);               // center at origin
            model.scale.multiplyScalar(1.0 / maxDim);  // normalize to unit size

            // Ensure all materials are visible
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material.transparent = true;
                    child.material.depthWrite = true;
                    child.material.side = THREE.DoubleSide;
                    console.log('Mesh found:', child.name, 'material:', child.material.type);
                }
            });

            // Left earring – direct clone
            const leftModel = model.clone();
            earringGroupL.add(leftModel);

            // Right earring – mirrored on X axis
            const rightModel = model.clone();
            earringGroupR.add(rightModel);
            // Mirror by flipping X scale on the group
            earringGroupR.scale.x = -1;

            modelLoaded = true;
            console.log('stud.glb loaded and ready ✓');
        }, (progress) => {
            console.log('Loading stud.glb:', Math.round((progress.loaded / progress.total) * 100) + '%');
        }, (error) => {
            console.error('Error loading stud.glb:', error);
        });

        // ═══════════════════════════════════════════════════════════════
        // AR EARRING TRACKER (3D version)
        // ═══════════════════════════════════════════════════════════════
        class AREarTracker3D {
            constructor() {
                // ── per-ear stabilizers ──
                // position – responsive, low lag
                this.pos_L = new PointStabilizer(1.5, 0.5);
                this.pos_R = new PointStabilizer(1.5, 0.5);
                // size – heavier smoothing (size shouldn't jitter)
                this.sz_L = new ScalarStabilizer(0.5, 0.05);
                this.sz_R = new ScalarStabilizer(0.5, 0.05);

                // ── global stabilizers ──
                this.angle_stab = new ScalarStabilizer(1.2, 0.3);
                this.faceh_stab = new ScalarStabilizer(0.6, 0.05);

                // ── fade state ──
                this.opacity_L = 0.0;
                this.opacity_R = 0.0;
                this.cache_L = null;      // { x, y, sz }
                this.cache_R = null;
                this.cache_angle = 0.0;
                this.t0 = performance.now() / 1000;
            }

            // ─────────────────── helpers ───────────────────
            _t() {
                return performance.now() / 1000 - this.t0;
            }

            _visibility(lm, w, h) {
                /** Which ears are geometrically visible (not occluded by head turn). */
                const nose = lm[NOSE];
                const L = lm[LEFT_TRAG];
                const R = lm[RIGHT_TRAG];
                const ld = this._distance(L, nose, w, h);
                const rd = this._distance(R, nose, w, h);
                return [
                    ld / (rd + 1e-6) > VIS_RATIO_THRESH,
                    rd / (ld + 1e-6) > VIS_RATIO_THRESH
                ];
            }

            _distance(p1, p2, w, h) {
                const dx = (p1.x - p2.x) * w;
                const dy = (p1.y - p2.y) * h;
                return Math.sqrt(dx * dx + dy * dy);
            }

            _head_roll_deg(lm, w, h) {
                /** Roll angle from outer eye corners (degrees). */
                const le = lm[LEFT_EYE_OUTER];
                const re = lm[RIGHT_EYE_OUTER];
                const dy = (re.y - le.y) * h;
                const dx = (re.x - le.x) * w;
                return Math.atan2(dy, dx) * 180 / Math.PI;
            }

            _face_height(lm, w, h) {
                /** Euclidean distance forehead → chin (pixels). */
                return this._distance(lm[FOREHEAD], lm[CHIN], w, h);
            }

            _yaw_factors(lm, w, h) {
                /**
                 * Per-ear scale multiplier driven by face yaw.
                 * Frontal → 1.0 ; turned away → shrinks to 0.4
                 * Gives a natural perspective / foreshortening effect.
                 */
                const nose = lm[NOSE];
                const L = lm[LEFT_TRAG];
                const R = lm[RIGHT_TRAG];
                const ld = this._distance(L, nose, w, h);
                const rd = this._distance(R, nose, w, h);
                const s = ld + rd + 1e-6;
                return [
                    Math.max(0.4, Math.min(1.0, ld / s * 2.0)),
                    Math.max(0.4, Math.min(1.0, rd / s * 2.0))
                ];
            }

            _estimate_lobe(lm, base_id, ref_id, w, h) {
                /**
                 * Project from a jaw-contour landmark outward along the
                 * jaw → ear direction to estimate the earlobe position.
                 */
                const bx = lm[base_id].x;
                const by = lm[base_id].y;
                const dx = bx - lm[ref_id].x;
                const dy = by - lm[ref_id].y;
                const px = bx + dx * EARLOBE_OFFSET;
                const py = by + dy * EARLOBE_OFFSET;
                return [px * w, py * h];
            }

            // ─────────────────── 3D overlay ───────────────────
            _update3D(group, cx, cy, sz, angle_deg, opacity, w, h) {
                if (!modelLoaded || sz < 4) {
                    group.visible = false;
                    return;
                }

                // Convert from pixel coords (top-left origin) to
                // orthographic camera coords (center origin, Y-up).
                const x3d = cx - w / 2;
                const y3d = -(cy - h / 2);  // flip Y

                const scale = sz * MODEL_SCALE_FACTOR;
                const angle_applied = angle_deg * TILT_DAMPING;

                group.position.set(x3d, y3d, 0);

                // Preserve mirror (negative X scale for right ear)
                const baseScaleX = Math.sign(group.scale.x) || 1;
                group.scale.set(baseScaleX * scale, scale, scale);

                group.rotation.set(0, 0, -angle_applied * Math.PI / 180);

                // Fade via material opacity
                group.visible = opacity > 0.01;
                group.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone ? child.material.clone() : child.material;
                        child.material.transparent = true;
                        child.material.opacity = opacity;
                    }
                });
            }

            // ─────────────────── per-frame entry point ───────────────────
            process(results, w, h) {
                const t = this._t();

                // ── no face: fade both earrings out gracefully ──
                if (!results.faceLandmarks || results.faceLandmarks.length === 0) {
                    this.opacity_L = Math.max(0.0, this.opacity_L - FADE_SPEED);
                    this.opacity_R = Math.max(0.0, this.opacity_R - FADE_SPEED);

                    if (this.cache_L && this.opacity_L > 0.01) {
                        this._update3D(earringGroupL, this.cache_L.x, this.cache_L.y, this.cache_L.sz, this.cache_angle, this.opacity_L, w, h);
                    } else {
                        earringGroupL.visible = false;
                    }
                    if (this.cache_R && this.opacity_R > 0.01) {
                        this._update3D(earringGroupR, this.cache_R.x, this.cache_R.y, this.cache_R.sz, this.cache_angle, this.opacity_R, w, h);
                    } else {
                        earringGroupR.visible = false;
                    }
                    return;
                }

                const lm = results.faceLandmarks[0];
                const [show_L, show_R] = this._visibility(lm, w, h);

                // ── face-wide metrics (stabilised) ──
                const fh = this.faceh_stab.update(t, this._face_height(lm, w, h));
                const angle = this.angle_stab.update(t, this._head_roll_deg(lm, w, h));
                const [lf, rf] = this._yaw_factors(lm, w, h);
                const base_sz = fh * EARRING_SIZE_RATIO;

                // ── LEFT earring ──
                if (show_L) {
                    let [x, y] = this._estimate_lobe(lm, LEFT_BASE, LEFT_REF, w, h);
                    [x, y] = this.pos_L.update(t, x, y);
                    const sz = this.sz_L.update(t, base_sz * lf);
                    this.opacity_L = Math.min(1.0, this.opacity_L + FADE_SPEED);
                    this.cache_L = { x, y, sz };
                } else {
                    this.opacity_L = Math.max(0.0, this.opacity_L - FADE_SPEED);
                }

                if (this.cache_L && this.opacity_L > 0.01) {
                    this._update3D(earringGroupL, this.cache_L.x, this.cache_L.y, this.cache_L.sz, angle, this.opacity_L, w, h);
                } else {
                    earringGroupL.visible = false;
                }

                // ── RIGHT earring ──
                if (show_R) {
                    let [x, y] = this._estimate_lobe(lm, RIGHT_BASE, RIGHT_REF, w, h);
                    [x, y] = this.pos_R.update(t, x, y);
                    const sz = this.sz_R.update(t, base_sz * rf);
                    this.opacity_R = Math.min(1.0, this.opacity_R + FADE_SPEED);
                    this.cache_R = { x, y, sz };
                } else {
                    this.opacity_R = Math.max(0.0, this.opacity_R - FADE_SPEED);
                }

                if (this.cache_R && this.opacity_R > 0.01) {
                    this._update3D(earringGroupR, this.cache_R.x, this.cache_R.y, this.cache_R.sz, angle, this.opacity_R, w, h);
                } else {
                    earringGroupR.visible = false;
                }

                this.cache_angle = angle;
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN APP
        // ═══════════════════════════════════════════════════════════════
        const video = document.getElementById('videoElement');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loading');

        let faceLandmarker, stream = null, animationId = null;
        let tracker = new AREarTracker3D();
        let lastVideoTime = -1;

        // Cache materials to avoid cloning every frame
        let materialsInitialized = false;
        const materialCache = new Map();

        function initMaterialCache(group, key) {
            group.traverse((child) => {
                if (child.isMesh) {
                    const mat = child.material.clone();
                    mat.transparent = true;
                    child.material = mat;
                    materialCache.set(key + '_' + child.uuid, mat);
                }
            });
        }

        // Override _update3D to use cached materials (patched after load)
        const origUpdate3D = AREarTracker3D.prototype._update3D;
        AREarTracker3D.prototype._update3D = function (group, cx, cy, sz, angle_deg, opacity, w, h) {
            if (!modelLoaded || sz < 4) {
                group.visible = false;
                return;
            }

            // Initialize material cache once
            if (!materialsInitialized && modelLoaded) {
                initMaterialCache(earringGroupL, 'L');
                initMaterialCache(earringGroupR, 'R');
                materialsInitialized = true;
            }

            // Convert from pixel coords (top-left origin) to
            // orthographic camera coords (center origin, Y-up).
            const x3d = cx - w / 2;
            const y3d = -(cy - h / 2);  // flip Y

            const scale = sz * MODEL_SCALE_FACTOR;
            const angle_applied = angle_deg * TILT_DAMPING;

            group.position.set(x3d, y3d, 0);

            // Preserve mirror (negative X scale for right ear)
            const baseScaleX = Math.sign(group.scale.x) || 1;
            group.scale.set(baseScaleX * scale, scale, scale);

            group.rotation.set(0, 0, -angle_applied * Math.PI / 180);

            // Fade via cached material opacity
            group.visible = opacity > 0.01;
            group.traverse((child) => {
                if (child.isMesh) {
                    child.material.opacity = opacity;
                }
            });
        };

        async function initializeMediaPipe() {
            loadingEl.classList.add('active');
            statusEl.textContent = 'Loading MediaPipe...';
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1,                        // max_num_faces=1
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false,
                    minFaceDetectionConfidence: 0.7,
                    minFacePresenceConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });
                loadingEl.classList.remove('active');
                statusEl.textContent = 'Ready! Click "Start Camera"';
                startButton.disabled = false;
            } catch (error) {
                console.error('Error:', error);
                loadingEl.classList.remove('active');
                statusEl.textContent = 'Error loading MediaPipe';
            }
        }

        async function startCamera() {
            try {
                statusEl.textContent = 'Requesting camera...';

                // Try 60fps first at various resolutions, then fallback to 30fps
                const constraints = [
                    { width: 1920, height: 1080, frameRate: 60 },
                    { width: 1280, height: 720, frameRate: 60 },
                    { width: 960, height: 540, frameRate: 60 },
                    { width: 640, height: 480, frameRate: 60 },
                    { width: 640, height: 360, frameRate: 60 },
                    { width: 1920, height: 1080, frameRate: 30 },
                    { width: 1280, height: 720, frameRate: 30 },
                    { width: 960, height: 540, frameRate: 30 },
                    { width: 640, height: 480, frameRate: 30 }
                ];

                let streamAcquired = false;
                for (const constraint of constraints) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: {
                                width: { ideal: constraint.width },
                                height: { ideal: constraint.height },
                                frameRate: { ideal: constraint.frameRate },
                                facingMode: 'user'
                            }
                        });

                        const track = stream.getVideoTracks()[0];
                        const settings = track.getSettings();
                        console.log(`Camera started: ${settings.width}x${settings.height}@${settings.frameRate}fps`);
                        statusEl.textContent = `Camera: ${settings.width}x${settings.height}@${settings.frameRate}fps`;
                        streamAcquired = true;
                        break;
                    } catch (err) {
                        console.log(`Failed ${constraint.width}x${constraint.height}@${constraint.frameRate}fps, trying next...`);
                    }
                }

                if (!streamAcquired) {
                    throw new Error('No compatible camera configuration found');
                }

                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    const w = video.videoWidth;
                    const h = video.videoHeight;

                    // Setup Three.js renderer + camera to match video dimensions
                    // Pass false to avoid overriding CSS styles (width:100%, height:100%)
                    renderer.setSize(w, h, false);

                    camera = new THREE.OrthographicCamera(
                        -w / 2, w / 2,    // left, right
                        h / 2, -h / 2,   // top, bottom
                        0.1, 1000         // near, far
                    );
                    camera.position.z = 500;

                    startButton.disabled = true;
                    stopButton.disabled = false;
                    processFrame();
                });
            } catch (err) {
                console.error('Camera error:', err);
                statusEl.textContent = 'Camera access denied or not available';
            }
        }

        function stopCamera() {
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            earringGroupL.visible = false;
            earringGroupR.visible = false;
            renderer.clear();
            startButton.disabled = false;
            stopButton.disabled = true;
            statusEl.textContent = 'Camera stopped';
            lastVideoTime = -1;
        }

        function processFrame() {
            if (!faceLandmarker || !video.videoWidth) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            const currentTime = video.currentTime;
            if (currentTime !== lastVideoTime) {
                lastVideoTime = currentTime;

                const results = faceLandmarker.detectForVideo(video, performance.now());
                tracker.process(results, video.videoWidth, video.videoHeight);

                if (camera) {
                    renderer.render(scene, camera);
                }
            }

            animationId = requestAnimationFrame(processFrame);
        }

        startButton.addEventListener('click', startCamera);
        stopButton.addEventListener('click', stopCamera);
        startButton.disabled = true;
        initializeMediaPipe();
    </script>
</body>

</html>
