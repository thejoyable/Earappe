<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Earring Try-On</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        
        #videoElement {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        #startButton {
            background: #667eea;
            color: white;
        }
        
        #startButton:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        #stopButton {
            background: #f56565;
            color: white;
        }
        
        #stopButton:hover:not(:disabled) {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 15px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>✨ AR Earring Try-On</h1>
    
    <div class="container">
        <div class="video-container">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="controls">
            <button id="startButton">Start Camera</button>
            <button id="stopButton" disabled>Stop</button>
        </div>
        
        <div class="status" id="status">Click "Start Camera" to begin</div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading MediaPipe...</p>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        
        let faceLandmarker;
        let stream = null;
        let animationId = null;
        let earringImage = new Image();
        let lastVideoTime = -1;

        // Landmark indices
        const LEFT_EAR_BASE = 234;
        const RIGHT_EAR_BASE = 454;
        const NOSE = 1;
        const LEFT_EYE_OUTER = 33;
        const RIGHT_EYE_OUTER = 263;
        const FOREHEAD = 10;
        const CHIN = 152;

        // Load earring image
        earringImage.src = '/static/earring.png';
        earringImage.onerror = () => {
            console.error('Failed to load earring image');
            status.textContent = 'Error: Could not load earring image';
        };

        // Initialize MediaPipe
        async function initializeMediaPipe() {
            loading.classList.add('active');
            status.textContent = 'Loading MediaPipe Face Landmarker...';
            
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );
                
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1,
                    minFaceDetectionConfidence: 0.5,
                    minFacePresenceConfidence: 0.5,
                    minTrackingConfidence: 0.5,
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false
                });
                
                loading.classList.remove('active');
                status.textContent = 'MediaPipe loaded! Click "Start Camera" to begin';
                startButton.disabled = false;
            } catch (error) {
                console.error('Error initializing MediaPipe:', error);
                loading.classList.remove('active');
                status.textContent = 'Error loading MediaPipe. Please refresh the page.';
            }
        }

        startButton.addEventListener('click', startCamera);
        stopButton.addEventListener('click', stopCamera);

        async function startCamera() {
            try {
                status.textContent = 'Requesting camera access...';
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    } 
                });
                
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startButton.disabled = true;
                    stopButton.disabled = false;
                    status.textContent = 'Camera active - Try on earrings!';
                    processFrame();
                });
            } catch (err) {
                console.error('Error accessing camera:', err);
                status.textContent = 'Error: Could not access camera. Please allow camera permissions.';
            }
        }

        function stopCamera() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            startButton.disabled = false;
            stopButton.disabled = true;
            status.textContent = 'Camera stopped';
            lastVideoTime = -1;
        }

        function calculateDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        function calculateAngle(p1, p2) {
            return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
        }

        function drawEarring(landmark, isLeft) {
            if (!earringImage.complete) return;
            
            const x = landmark.x * canvas.width;
            const y = landmark.y * canvas.height;
            
            // Calculate face height for sizing
            const forehead = faceLandmarker.lastResults.faceLandmarks[0][FOREHEAD];
            const chin = faceLandmarker.lastResults.faceLandmarks[0][CHIN];
            const faceHeight = calculateDistance(forehead, chin) * canvas.height;
            
            // Calculate head tilt
            const leftEye = faceLandmarker.lastResults.faceLandmarks[0][LEFT_EYE_OUTER];
            const rightEye = faceLandmarker.lastResults.faceLandmarks[0][RIGHT_EYE_OUTER];
            const angle = calculateAngle(leftEye, rightEye);
            
            // Earring size
            const earringHeight = faceHeight * 0.25;
            const earringWidth = earringHeight * (earringImage.width / earringImage.height);
            
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180 * 0.35); // Damped rotation
            
            if (isLeft) {
                ctx.scale(-1, 1); // Mirror for left ear
            }
            
            ctx.drawImage(
                earringImage,
                -earringWidth / 2,
                0,
                earringWidth,
                earringHeight
            );
            
            ctx.restore();
        }

        function processFrame() {
            if (!faceLandmarker || !video.videoWidth) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            const currentTime = video.currentTime;
            if (currentTime !== lastVideoTime) {
                lastVideoTime = currentTime;
                
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Detect faces
                const results = faceLandmarker.detectForVideo(video, performance.now());
                faceLandmarker.lastResults = results;
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // Check visibility based on nose-to-ear distance
                    const nose = landmarks[NOSE];
                    const leftEar = landmarks[LEFT_EAR_BASE];
                    const rightEar = landmarks[RIGHT_EAR_BASE];
                    
                    const leftDist = calculateDistance(nose, leftEar);
                    const rightDist = calculateDistance(nose, rightEar);
                    const ratio = 0.75;
                    
                    // Draw earrings
                    if (leftDist / rightDist > ratio) {
                        drawEarring(leftEar, true);
                    }
                    if (rightDist / leftDist > ratio) {
                        drawEarring(rightEar, false);
                    }
                }
            }
            
            animationId = requestAnimationFrame(processFrame);
        }

        // Initialize on page load
        startButton.disabled = true;
        initializeMediaPipe();
    </script>
</body>
</html>
